[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/functions/_assets/**"]

[build.environment]
  # Pin Node so the build is reproducible (Vite 8 needs >= 20.19).
  NODE_VERSION = "22"
  # Don't download puppeteer's bundled Chromium during install — it can't launch
  # on the Netlify build image. The post-build prerender crawl (scripts/prerender.mjs)
  # uses @sparticuz/chromium instead. Prerender failures fail the build (PRERENDER_STRICT
  # defaults on in CI) so missing SEO HTML can't ship unnoticed.
  PUPPETEER_SKIP_DOWNLOAD = "true"

# Note: /api/* routes are registered by each function's own `export const config`
# (e.g. planner.mjs -> path: '/api/planner'), which takes precedence over the SPA
# catch-all below — no per-function rewrite is needed here.

[[redirects]]
  from = "https://destinationparadisezanzibar.netlify.app/*"
  to = "https://yournexttriptoparadise.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/book-now"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/booking"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/trip-planner"
  to = "/index.html"
  status = 200

# Experiences store (feature-flagged; HANDOFF.md). Client-only routes — direct
# navigation, checkout and future hosted-payment returns must reach the SPA
# instead of the 404 page. While the flag is off the app renders its own 404.
[[redirects]]
  from = "/store"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/store/*"
  to = "/index.html"
  status = 200

# SPA fallback. Static files in dist/ (sitemap.xml, robots.txt, assets) are served
# ahead of this catch-all, so unknown URLs return the prerendered 404 page.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
