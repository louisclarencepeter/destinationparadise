<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A4D6E" />
    <link rel="icon" href="/img/logo-primary.png" />
    <title>Destination Paradise — your next trip to paradise</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Static stub forms so Netlify's build-time form detector sees them.
         The React forms POST to '/' with the matching `form-name` field. -->
    <form name="newsletter" data-netlify="true" hidden>
      <input type="email" name="email" />
    </form>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
